{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center my-5">
    <div class="card p-4 shadow-sm" style="max-width: 450px; width: 100%;">
        <h2 class="text-center mb-4 text-primary fw-bold">Create an Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-bold">Sign Up</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Log In</a></small>
        </div>
    </div>
</div>
{% endblock %}
