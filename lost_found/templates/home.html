{% extends "base.html" %} {% block title %} Home Page {% endblock %}
{% block content %}

<div class="container my-5">
    <h1 class="mb-4">LOST AND FOUND FORUM</h1>
    <!-- 1. Search Bar Form -->
    <form method="GET" action="" class="form-inline mb-4">
        <input class="form-control mr-sm-2" type="search" name="q" placeholder="Search Lost Item..." value="{{ request.GET.q }}">
        <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
    </form>
    <!-- 2. Display Grid of items -->
    <div class="row">
        {% for item in items %}
            {% include "item_card.html" %}
        {% empty %}
            <!-- Show if no items were found in database or search -->
            <div class="col-12 text-center my-5">
                <h3>No items match your search. Try another query!</h3>
            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
